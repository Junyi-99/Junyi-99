<svg fill="none" viewBox="0 0 600 600" width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes hi {
      0% {
        transform: rotate(0.0deg)
      }

      10% {
        transform: rotate(14.0deg)
      }

      20% {
        transform: rotate(-8.0deg)
      }

      30% {
        transform: rotate(14.0deg)
      }

      40% {
        transform: rotate(-4.0deg)
      }

      50% {
        transform: rotate(10.0deg)
      }

      60% {
        transform: rotate(0.0deg)
      }

      100% {
        transform: rotate(0.0deg)
      }
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }


    .color-background {
      --color-main: #ef476f;
      --color-primary: #ffd166;
      --color-secondary: #06d6a0;
      --color-tertiary: #118ab2;
      background: linear-gradient(-45deg, var(--color-main),
          var(--color-primary),
          var(--color-secondary),
          var(--color-tertiary));
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;

      width: 100%;
      height: 150px;

      border-radius: 30px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      
      margin-bottom: 12px;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    }

    .hi {
      animation: hi 1.5s linear -0.5s infinite;
      display: inline-block;
      transform-origin: 70% 70%;
    }

    @media (prefers-color-scheme: light) {
      .color-background {
        --color-main: #F15BB5;
        --color-primary: #24b0ef;
        --color-secondary: #4526f6;
        --color-tertiary: #45f698;
      }
    }

    @media (prefers-reduced-motion) {
      .color-background {
        animation: none;
      }

      .hi {
        animation: none;
      }
    }

    h1 {
      margin-block-end: 0px;
    }

    .achievements {
      width: 100%;
      margin-top: 20px;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: space-between;
      align-items: flex-start;
    }

    .parent {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="parent">

      <link rel="stylesheet" type="text/css" href="a.css" />
      <div class="color-background">
        <h1>Hi there, I'm Junyi <div class="hi">👋</div>
        </h1>
        <p>Pronounciation: [ˈdʒun iː] (somewhat like June·E)</p>
        <!-- <p>Welcome to my blog <a href="https://www.junyi.dev">https://www.junyi.dev/</a></p> -->
      </div>
      <img style="" height="20"
        src="https://camo.githubusercontent.com/a3495fa25054411758e82e328ee67c5353330c37864d4fff99e0630cee8f0b2e/68747470733a2f2f6b6f6d617265762e636f6d2f67687076632f3f757365726e616d653d4a756e79692d393926636f6c6f723d626c7565267374796c653d666c61742d737175617265266c6162656c3d50524f46494c452b5649455753"></img>
      <div class="achievements">
        <img style="" src="https://raw.githubusercontent.com/Junyi-99/Junyi-99/main/metrics.plugin.achievements.svg" />
        <img style="position:absolute; left: 350px;"
          src="https://raw.githubusercontent.com/Junyi-99/Junyi-99/main/metrics.plugin.isocalendar.svg" />
      </div>

    </div>
  </foreignObject>
</svg>